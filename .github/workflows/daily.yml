name: Daily Rank Snapshot

on:
  # 北京时间每日 10:30 + 11:30 双触发（10:00 榜单更新后各留出 30/90 分钟）
  # 加两个时间是因为 GitHub schedule 偶尔静默跳过某次触发。
  # 第一次成功后第二次的数据一样，git commit 会跳过——无副作用。
  schedule:
    - cron: "30 2 * * *"
    - cron: "30 3 * * *"
  # 也允许手动触发
  workflow_dispatch:
    inputs:
      top_n:
        description: "Top N per board (overrides default)"
        required: false
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright openpyxl
          python -m playwright install --with-deps chromium

      - name: Scrape daily snapshot
        env:
          GRAVITY_AUTH: ${{ secrets.GRAVITY_AUTH }}
          GRAVITY_TOP_N: ${{ github.event.inputs.top_n }}
        run: python scripts/ci_scrape.py

      - name: Compute diff vs previous day
        run: python scripts/ci_diff.py

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          DATE=$(date -u -d "+8 hours" +%F)
          git commit -m "data: $DATE snapshot"
          git push

      - name: Trigger Pages deploy
        # GitHub does NOT auto-trigger downstream workflows from a
        # bot-authored push, so we kick off pages.yml explicitly.
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main
