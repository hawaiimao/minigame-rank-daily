<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>引力小游戏榜单监控</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>引力小游戏榜单监控</h1>
    <div class="meta">
      <span id="meta-date">—</span>
      <span class="sep">·</span>
      <span>已追踪 <strong id="meta-days">—</strong> 天</span>
      <span class="sep">·</span>
      <span id="meta-source">数据来源：rank.gravity-engine.com</span>
    </div>
  </header>

  <div class="tabs-row">
    <nav class="board-tabs" id="board-tabs"></nav>
    <div class="date-picker-inline">
      <span class="dp-label">历史日期</span>
      <select id="date-picker"></select>
      <button id="date-load">载入</button>
    </div>
  </div>

  <section>
    <div class="panel" id="panel-new">
      <h2>本日新进产品 <span class="muted"><span id="panel-new-board"></span><span id="panel-new-count"></span></span></h2>
      <div class="sub">
        基于此榜历史。
        <span class="legend"><span class="badge first-board">新进榜</span></span>
        <span class="legend"><span class="badge returning">回归</span></span>
        <span class="legend"><span class="badge new-pub">新厂</span></span>
      </div>
      <div class="table-wrap">
      <table id="tbl-new">
        <thead>
          <tr>
            <th>类型</th><th>排名</th><th>游戏名</th><th>分类</th>
            <th>子类 / 标语</th><th>发行商</th><th>厂商</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      </div>
    </div>
  </section>

  <section class="panel">
    <h2>当前榜单全貌 <span class="muted" id="panel-board-name"></span></h2>
    <div class="sub">点击表头排序</div>
    <div class="table-wrap">
    <table id="tbl-full">
      <thead>
        <tr>
          <th>排名</th><th>游戏名</th><th>分类</th>
          <th>子类</th><th>发行商</th><th>变化</th><th>新</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    </div>
  </section>

  <footer>
    <p>
      数据来源：
      <a href="https://rank.gravity-engine.com/" target="_blank" rel="noopener">rank.gravity-engine.com</a>
      （榜单每日 10:00 更新）
      ·
      本站每日北京时间 <strong>13:33</strong> 自动抓取（GitHub Actions + Pages）
      ·
      <a href="https://github.com/hawaiimao/minigame-rank-daily" target="_blank" rel="noopener">源码</a>
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
